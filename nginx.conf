server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para JS/CSS/HTML
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cabeceras de caché para assets compilados (hash en el nombre → inmutables)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Archivos estáticos de public/ (logo.svg, etc.)
    location ~* \.(ico|svg|png|jpg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA fallback — todas las rutas desconocidas sirven index.html
    # para que Vue Router maneje la navegación del lado del cliente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ocultar versión de nginx en cabeceras de error
    server_tokens off;
}
